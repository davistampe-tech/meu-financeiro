function renderCartao() {
  const cartoes = state.cartoes;
  const lancamentos = state.lancamentos;
  const cartaoLancs = lancamentos.filter(l => l.cartao === true && l.tipo === 'gasto');

  // KPIs — use first card as primary
  const card = cartoes[0];
  const totalFatura = cartaoLancs.reduce((s, l) => s + l.valor, 0);
  const limiteDisp = card ? card.limite - totalFatura : 0;
  const pctUsado = card && card.limite > 0 ? Math.round(totalFatura / card.limite * 100) : 0;

  const kpisEl = document.getElementById('cartao-kpis');
  kpisEl.innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">Fatura atual</div>
      <div class="kpi-val neg">${fmt(totalFatura)}</div>
      <div class="kpi-sub">${pctUsado}% do limite usado</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Limite disponível</div>
      <div class="kpi-val ${limiteDisp >= 0 ? 'pos' : 'neg'}">${fmt(Math.max(limiteDisp, 0))}</div>
      <div class="kpi-sub">de ${card ? fmt(card.limite) : '—'} total</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Vencimento</div>
      <div class="kpi-val neutral">Dia ${card ? card.vencimento : '—'}</div>
      <div class="kpi-sub">Fecha dia ${card ? card.fechamento : '—'}</div>
    </div>`;

  // Barra de limite
  const barColor = pctUsado > 90 ? 'var(--red)' : pctUsado > 70 ? 'var(--yellow)' : 'var(--accent)';

  // Config list
  const configEl = document.getElementById('cartao-config-list');
  if (cartoes.length === 0) {
    configEl.innerHTML = '<div class="empty-state"><strong>Nenhum cartão cadastrado</strong></div>';
  } else {
    configEl.innerHTML = cartoes.map((c, i) => `
      <div class="asset-item-edit">
        <div>
          <div class="asset-name" contenteditable="true"
            onblur="updateCartaoField(${i},'nome',this.textContent)">${c.nome}</div>
          <div class="asset-type">${c.moeda === 'EUR' ? '€ Euro' : 'R$ Real'} · Fecha dia ${c.fechamento} · Vence dia ${c.vencimento}</div>
        </div>
        <span class="asset-pct">${pctUsado}% usado</span>
        <input class="editable-val" type="number" value="${c.limite}" min="0" step="0.01"
          style="color:var(--accent);width:110px" placeholder="Limite"
          onchange="updateCartaoLimite(${i},this.value)">
        <button class="del-item-btn" onclick="delCartao(${i})" style="opacity:1">✕</button>
      </div>`).join('');
  }

  // Progresso por categoria
  const catsEl = document.getElementById('cartao-cats');
  const cats = {};
  cartaoLancs.forEach(l => { cats[l.categoria] = (cats[l.categoria] || 0) + l.valor; });
  const orcGastos = state.orcamento.gastos;

  if (Object.keys(cats).length === 0) {
    catsEl.innerHTML = '<div class="empty-state"><strong>Nenhum gasto no cartão ainda</strong>Diga: <em style="color:var(--text-muted)">"gastei 100 em festa no cartão"</em></div>';
  } else {
    let html = '';
    Object.entries(cats).forEach(([cat, val]) => {
      const plan = orcGastos.find(g => g.label === cat);
      const pct = plan && plan.val > 0 ? Math.min(val / plan.val * 100, 100) : 100;
      const over = plan && val > plan.val;
      const barCls = over ? 'bar-over' : pct > 80 ? 'bar-warn' : 'bar-ok';
      html += `<div class="progress-row">
        <div class="progress-meta">
          <span class="progress-label">${cat}</span>
          <div class="progress-vals">
            <span class="progress-exec ${over ? 'neg' : ''}">${fmt(val)}</span>
            ${plan ? '<span class="progress-plan">/ ' + fmt(plan.val) + '</span>' : ''}
          </div>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill ${barCls}" style="width:${pct}%"></div>
        </div>
      </div>`;
    });
    catsEl.innerHTML = html;
  }

  // Lançamentos
  const lancEl = document.getElementById('cartao-lancamentos');
  const badge = document.getElementById('cartao-badge');
  badge.textContent = cartaoLancs.length + ' lançamento' + (cartaoLancs.length !== 1 ? 's' : '');
  badge.className = 'badge ' + (cartaoLancs.length > 0 ? 'badge-yellow' : 'badge-green');

  if (cartaoLancs.length === 0) {
    lancEl.innerHTML = '<div class="empty-state"><strong>Nenhum lançamento no cartão</strong></div>';
  } else {
    lancEl.innerHTML = [...cartaoLancs].reverse().slice(0, 15).map(l => `
      <div class="table-row">
        <span class="table-desc">${l.descricao}</span>
        <span class="table-cat">${l.categoria}</span>
        <span class="table-val neg">-${fmt(l.valor)}</span>
      </div>`).join('');
  }
}

