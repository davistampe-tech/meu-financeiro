function addOrcamentoItem(type) {
  const label = type === 'receitas' ? 'Nova receita' : 'Novo gasto';
  state.orcamento[type].push({ label, val: 0 });
  saveState();
  renderOrcamento();
  // Focus last editable label
  const items = document.getElementById('bud-' + type).querySelectorAll('.editable-label');
  if (items.length > 0) {
    const last = items[items.length - 1];
    last.focus();
    const range = document.createRange();
    range.selectNodeContents(last);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
  }
}

