      <button class="del-item-btn" onclick="delOrcItem('gastos',${i})">✕</button>
    </div>`).join('');

  const totRec = state.orcamento.receitas.reduce((s, r) => s + r.val, 0);
  const totGasto = state.orcamento.gastos.reduce((s, g) => s + g.val, 0);
  document.getElementById('bud-tot-rec').textContent = fmt(totRec);
  document.getElementById('bud-tot-gasto').textContent = fmt(totGasto);
  document.getElementById('bud-sobra').textContent = fmt(totRec - totGasto);
