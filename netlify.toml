function fecharMes() {
  if (state.lancamentos.length === 0) {
    alert('Nenhum lançamento este mês. Adicione gastos antes de fechar o mês.');
    return;
  }
  const confirmar = confirm('Fechar ' + state.mesAtual + '? Os lançamentos serão arquivados e o orçamento copiado para o próximo mês.');
  if (!confirmar) return;

  // Archive current month
  const totalRec = state.lancamentos.filter(l => l.tipo === 'receita').reduce((s, l) => s + l.valor, 0);
  const totalGasto = state.lancamentos.filter(l => l.tipo === 'gasto').reduce((s, l) => s + l.valor, 0);
  const saldo = totalRec - totalGasto;
  const planejadoRec = state.orcamento.receitas.reduce((s, r) => s + r.val, 0);
  const taxa = planejadoRec > 0 ? Math.round(saldo / planejadoRec * 100) : 0;

  state.historico.unshift({
    mes: state.mesAtual,
    lancamentos: [...state.lancamentos],
    orcamento: JSON.parse(JSON.stringify(state.orcamento)),
    totalReceitas: totalRec,
    totalGastos: totalGasto,
    saldo,
    taxa
  });

  // Advance to next month
  const partes = state.mesAtual.split(' de ');
  const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  let idxMes = meses.indexOf(partes[0].toLowerCase());
  let ano = parseInt(partes[1]);
  idxMes++;
  if (idxMes > 11) { idxMes = 0; ano++; }
  state.mesAtual = meses[idxMes] + ' de ' + ano;

  // Zero lancamentos, keep orcamento (copy forward)
  state.lancamentos = [];
  state.chatHistory = [];

  saveState();
  updateMiniBar();
  updateMesBadge();
  renderDashboard();

  // Clear chat except welcome
  const msgs = document.getElementById('chat-messages');
  while (msgs.children.length > 1) msgs.removeChild(msgs.lastChild);
  addMsg('assistant', '✓ Mês fechado e arquivado! Bem-vindo a <strong>' + state.mesAtual + '</strong>. O orçamento foi copiado — ajuste se precisar na aba Orçamento.');
}

function updateMesBadge() {
  const el = document.getElementById('mes-badge');
  if (el) el.textContent = state.mesAtual;
}

function renderHistorico() {
  const hist = state.historico;
  const emptyEl = document.getElementById('historico-empty');
  const listEl = document.getElementById('historico-list');
  const detEl = document.getElementById('historico-detalhe');
  detEl.style.display = 'none';

  if (hist.length === 0) {
    emptyEl.style.display = 'block';
    listEl.innerHTML = '';
    return;
  }

  emptyEl.style.display = 'none';
  listEl.innerHTML = hist.map((h, i) => `
    <div class="hist-card" onclick="verDetalhe(${i})">
      <div>
        <div class="hist-mes">${h.mes}</div>
        <div class="hist-meta">${h.lancamentos.length} lançamentos · ${h.taxa}% poupança</div>
      </div>
      <div>
        <div class="hist-val" style="color:var(--accent)">+${fmt(h.totalReceitas)}</div>
        <div style="font-size:11px;color:var(--text-hint);text-align:right">receitas</div>
      </div>
      <div>
        <div class="hist-val" style="color:var(--red)">-${fmt(h.totalGastos)}</div>
        <div style="font-size:11px;color:var(--text-hint);text-align:right">gastos</div>
      </div>
      <div>
        <div class="hist-val ${h.saldo >= 0 ? '' : 'neg'}" style="color:${h.saldo >= 0 ? 'var(--accent)' : 'var(--red)'}">${fmt(h.saldo)}</div>
        <div style="font-size:11px;color:var(--text-hint);text-align:right">saldo</div>
      </div>
    </div>`).join('');
}

function verDetalhe(i) {
  const h = state.historico[i];
  document.getElementById('historico-list').style.display = 'none';
  document.getElementById('historico-empty').style.display = 'none';
  const detEl = document.getElementById('historico-detalhe');
  detEl.style.display = 'block';
  document.getElementById('det-titulo').textContent = h.mes.charAt(0).toUpperCase() + h.mes.slice(1);

  // KPIs
  document.getElementById('det-kpis').innerHTML = `
    <div class="kpi-card"><div class="kpi-label">Receitas</div><div class="kpi-val pos">${fmt(h.totalReceitas)}</div></div>
    <div class="kpi-card"><div class="kpi-label">Gastos</div><div class="kpi-val neg">${fmt(h.totalGastos)}</div></div>
    <div class="kpi-card"><div class="kpi-label">Saldo</div><div class="kpi-val ${h.saldo >= 0 ? 'pos' : 'neg'}">${fmt(h.saldo)}</div></div>`;

  // Cats comparativo
  const gastos = h.lancamentos.filter(l => l.tipo === 'gasto');
  const cats = {};
  gastos.forEach(l => { cats[l.categoria] = (cats[l.categoria] || 0) + l.valor; });
  let catsHtml = '';
  h.orcamento.gastos.forEach(og => {
    const exec = cats[og.label] || 0;
    const pct = og.val > 0 ? Math.min(exec / og.val * 100, 100) : 100;
    const over = exec > og.val;
    const barCls = over ? 'bar-over' : pct > 80 ? 'bar-warn' : 'bar-ok';
    catsHtml += `<div class="progress-row">
      <div class="progress-meta">
        <span class="progress-label">${og.label}</span>
        <div class="progress-vals">
          <span class="progress-exec">${fmt(exec)}</span>
          <span class="progress-plan">/ ${fmt(og.val)}</span>
        </div>
      </div>
      <div class="progress-bar-track"><div class="progress-bar-fill ${barCls}" style="width:${pct}%"></div></div>
    </div>`;
  });
  document.getElementById('det-cats').innerHTML = catsHtml || '<div class="empty-state">Sem categorias planejadas.</div>';

  // Lançamentos
  document.getElementById('det-lancs').innerHTML = h.lancamentos.length === 0
    ? '<div class="empty-state">Nenhum lançamento.</div>'
    : [...h.lancamentos].reverse().map(l => `
        <div class="table-row">
          <span class="table-desc">${l.descricao}</span>
          <span class="table-cat">${l.categoria}</span>
          <span class="table-val ${l.tipo === 'receita' ? 'pos' : 'neg'}">${l.tipo === 'receita' ? '+' : '-'}${fmt(l.valor)}</span>
        </div>`).join('');
}

function fecharDetalhe() {
  document.getElementById('historico-detalhe').style.display = 'none';
  document.getElementById('historico-list').style.display = 'block';
  renderHistorico();
}

function renderAll() {
  updateMiniBar();
  const activePanel = document.querySelector('.panel.active');
  if (activePanel) {
    const id = activePanel.id.replace('panel-', '');
    if (id === 'chat') renderUltimosLancs();
    if (id === 'dashboard') renderDashboard();
    if (id === 'orcamento') renderOrcamento();
    if (id === 'patrimonio') renderPatrimonio();
    if (id === 'cartao') renderCartao();
    if (id === 'historico') renderHistorico();
  }
}

function gerarTextoResumo() {
  const nome = state.nome || 'Cliente';
  const mes = new Date().toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
  const lancamentos = state.lancamentos;
  const receitas = lancamentos.filter(l => l.tipo === 'receita');
  const gastos = lancamentos.filter(l => l.tipo === 'gasto');
  const totalRec = receitas.reduce((s, l) => s + l.valor, 0);
  const totalGasto = gastos.reduce((s, l) => s + l.valor, 0);
  const saldo = totalRec - totalGasto;
  const planejadoRec = state.orcamento.receitas.reduce((s, r) => s + r.val, 0);
  const taxa = planejadoRec > 0 ? Math.round((saldo / planejadoRec) * 100) : 0;

  let txt = `📊 RESUMO FINANCEIRO — ${mes.toUpperCase()}\n`;
  txt += `👤 ${nome}\n`;
  txt += `${'─'.repeat(32)}\n\n`;

  txt += `💰 RECEITAS: ${fmt(totalRec)}\n`;
  txt += `💸 GASTOS: ${fmt(totalGasto)}\n`;
  txt += `📈 SALDO: ${fmt(saldo)}\n`;
  txt += `🎯 TAXA DE POUPANÇA: ${taxa}%\n\n`;

  if (gastos.length > 0) {
    txt += `📋 GASTOS POR CATEGORIA\n`;
    const cats = {};
    gastos.forEach(l => {
      cats[l.categoria] = (cats[l.categoria] || 0) + l.valor;
    });
    Object.entries(cats).forEach(([cat, val]) => {
      const plan = state.orcamento.gastos.find(g => g.label === cat);
      const status = plan ? (val > plan.val ? '⚠️' : '✓') : '';
      txt += `  ${status} ${cat}: ${fmt(val)}`;
      if (plan) txt += ` (planejado: ${fmt(plan.val)})`;
      txt += '\n';
    });
    txt += '\n';
  }

  if (lancamentos.length > 0) {
    txt += `🧾 ÚLTIMOS LANÇAMENTOS\n`;
    [...lancamentos].reverse().slice(0, 8).forEach(l => {
      const sinal = l.tipo === 'receita' ? '+' : '-';
      txt += `  ${l.data} · ${l.descricao} · ${sinal}${fmt(l.valor)}\n`;
    });
    txt += '\n';
  }

  const totAtivos = state.patrimonio.ativos.reduce((s, a) => s + a.val, 0);
  const totDividas = state.patrimonio.dividas.reduce((s, d) => s + d.val, 0);
  txt += `🏦 PATRIMÔNIO LÍQUIDO: ${fmt(totAtivos - totDividas)}\n`;
  txt += `  Investimentos: ${fmt(totAtivos)}\n`;
  txt += `  Dívidas: ${fmt(totDividas)}\n\n`;

  txt += `Gerado em ${new Date().toLocaleDateString('pt-BR')} via Meu Financeiro`;
  return txt;
}

function exportarTexto() {
  const txt = gerarTextoResumo();
  navigator.clipboard.writeText(txt).then(() => {
    const toast = document.getElementById('copy-toast');
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 4000);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = txt;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const toast = document.getElementById('copy-toast');
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 4000);
  });
}

function exportarTxt() {
  const txt = gerarTextoResumo();
  const nome = (state.nome || 'cliente').toLowerCase().replace(/\s+/g, '_');
  const mes = new Date().toLocaleDateString('pt-BR', { month: 'long' }).toLowerCase();
  const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `resumo_${nome}_${mes}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

function showPanelMobile(id, btn) {
  // Update main panel
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  // Update bottom nav
  document.querySelectorAll('.bottom-nav-item').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  // Render panel
  if (id === 'dashboard') renderDashboard();
  if (id === 'orcamento') renderOrcamento();
  if (id === 'patrimonio') renderPatrimonio();
  if (id === 'cartao') renderCartao();
  if (id === 'historico') renderHistorico();
  if (id === 'chat') renderUltimosLancs();
  window.scrollTo(0, 0);
}

function setCurrencyMobile(c, btn) {
  state.moeda = c;
  sym = c === 'EUR' ? '€' : 'R$';
  document.querySelectorAll('.mobile-moeda-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.querySelectorAll('.currency-btn').forEach((b, i) => {
    b.classList.toggle('active', (c === 'EUR' && i === 1) || (c === 'BRL' && i === 0));
  });
  saveState();
  renderAll();
}

function toggleMaisMenu() {
  const m = document.getElementById('mais-menu');
  m.style.display = m.style.display === 'none' ? 'block' : 'none';
}

document.addEventListener('click', function(e) {
  const m = document.getElementById('mais-menu');
  const btn = document.getElementById('bnav-mais');
  if (m && m.style.display === 'block' && btn && !m.contains(e.target) && !btn.contains(e.target)) {
    m.style.display = 'none';
  }
});

function updateMobileHeader() {
  const el = document.getElementById('mobile-nome-label');
  if (el && state.nome) el.textContent = state.nome;
}

function getCatEmoji(cat) {
  const m = {'Alimentação':'🍽','Moradia':'🏠','Transporte':'🚌','Lazer':'🎉','Saúde':'💊','Esporte':'🏃','Salário':'💼','Freelance':'💻','Mesada':'🏦','Outros':'📦'};
  return m[cat] || '📌';
}

function populateRegCat() {
  const cats = tipoAtual === 'receita' ? state.categoriasReceita : state.categoriasGasto;
  const el = document.getElementById('reg-cat');
  if (!el) return;
  el.innerHTML = cats.map(c => `<option value="${c}">${getCatEmoji(c)} ${c}</option>`).join('');
}

function abrirGerenciarCats() {
  renderCatsList();
  document.getElementById('cats-modal').style.display = 'flex';
}

function fecharCatsModal() {
  document.getElementById('cats-modal').style.display = 'none';
  populateRegCat();
}

function renderCatsList() {
  ['gasto','receita'].forEach(tipo => {
    const arr = tipo === 'gasto' ? state.categoriasGasto : state.categoriasReceita;
    const defaults = tipo === 'gasto' ? 7 : 4;
    const el = document.getElementById('cats-' + tipo + '-list');
    if (!el) return;
    el.innerHTML = arr.map((c, i) => `
      <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;margin-bottom:6px">
        <span style="flex:1;font-size:13px">${getCatEmoji(c)} ${c}</span>
        ${i >= defaults ? `<button onclick="removerCat('${tipo}',${i})" style="background:none;border:none;color:var(--text-hint);cursor:pointer;font-size:13px;padding:2px 6px;border-radius:3px" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text-hint)'">✕</button>` : '<span style="font-size:10px;color:var(--text-hint)">padrão</span>'}
      </div>`).join('');
  });
}

function adicionarCat(tipo) {
  const id = 'nova-cat-' + tipo;
  const val = document.getElementById(id).value.trim();
  if (!val) return;
  const arr = tipo === 'gasto' ? state.categoriasGasto : state.categoriasReceita;
  if (!arr.includes(val)) arr.push(val);
  saveState();
  document.getElementById(id).value = '';
  renderCatsList();
}

function removerCat(tipo, idx) {
  const arr = tipo === 'gasto' ? state.categoriasGasto : state.categoriasReceita;
  arr.splice(idx, 1);
  saveState();
  renderCatsList();
}

// ── INIT ──
if (state.nome) {
  document.getElementById('cfg-nome').value = state.nome;
  updateNome();
}
if (state.moeda === 'EUR') {
  sym = '€';
  document.querySelectorAll('.currency-btn').forEach((b, i) => {
    b.classList.toggle('active', i === 1);
  });
}
renderAll();
</script>
</body>
</html>
