  <div id="mais-menu" style="display:none;position:fixed;bottom:60px;right:0;left:0;background:var(--surface);border-top:1px solid var(--border);z-index:99">
    <button onclick="showPanelMobile('cartao',document.getElementById('bnav-mais'));toggleMaisMenu()" style="width:100%;padding:14px 20px;background:none;border:none;border-bottom:1px solid var(--border);color:var(--text);font-size:14px;font-family:DM Sans,sans-serif;text-align:left;cursor:pointer">💳 Cartão de Crédito</button>
    <button onclick="showPanelMobile('historico',document.getElementById('bnav-mais'));toggleMaisMenu()" style="width:100%;padding:14px 20px;background:none;border:none;color:var(--text);font-size:14px;font-family:DM Sans,sans-serif;text-align:left;cursor:pointer">🕐 Meses anteriores</button>
  </div>

