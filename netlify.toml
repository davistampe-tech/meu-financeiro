<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Financeiro — Mentoria</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F0F0E;
  --surface: #1A1A18;
  --surface2: #222220;
  --border: #2E2E2B;
  --border2: #3A3A37;
  --text: #F0EFE9;
  --text-muted: #8A8A82;
  --text-hint: #555550;
  --accent: #C8F060;
  --accent-dim: #A8D040;
  --accent-bg: #1E2410;
  --red: #FF5A5A;
  --red-bg: #1F1010;
  --blue: #60A8F0;
  --blue-bg: #101820;
  --yellow: #F0C860;
  --yellow-bg: #1F1A10;
  --radius: 12px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

/* ── LAYOUT ── */
.shell {
  display: grid;
  grid-template-columns: 240px 1fr;
  grid-template-rows: 100vh;
  max-width: 1100px;
  margin: 0 auto;
  height: 100vh;
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 0;
  overflow: hidden;
}

.sidebar-header {
  padding: 1.5rem 1.25rem 1rem;
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1rem;
}

.logo-mark {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 14px;
  color: var(--bg);
  flex-shrink: 0;
}

.logo-text {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: var(--text);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 400;
}

.config-block {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.config-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.config-label {
  font-size: 11px;
  color: var(--text-hint);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  font-weight: 500;
  width: 50px;
  flex-shrink: 0;
}

.config-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 5px 8px;
  color: var(--text);
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
}

.config-input:focus { border-color: var(--border2); }

.currency-toggle {
  display: flex;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  flex: 1;
}

.currency-btn {
  flex: 1;
  padding: 5px 8px;
  background: none;
  border: none;
  color: var(--text-hint);
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}

.currency-btn.active {
  background: var(--accent);
  color: var(--bg);
  font-weight: 600;
}

.nav {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 0.75rem;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 400;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}

.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-bg); color: var(--accent); font-weight: 500; }

.nav-icon {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  opacity: 0.7;
}

.nav-item.active .nav-icon { opacity: 1; }

.nav-section {
  font-size: 10px;
  color: var(--text-hint);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  font-weight: 600;
  padding: 8px 10px 4px;
  margin-top: 4px;
}

.sidebar-footer {
  padding: 1rem 1.25rem;
  border-top: 1px solid var(--border);
}

.orçamento-mini {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}

.mini-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  margin-bottom: 4px;
}

.mini-row:last-child { margin-bottom: 0; }
.mini-label { color: var(--text-muted); }
.mini-val { font-family: 'DM Mono', monospace; font-size: 12px; }
.mini-val.pos { color: var(--accent); }
.mini-val.neg { color: var(--red); }

/* ── MAIN ── */
.main {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.panel {
  display: none;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

.panel.active { display: flex; }

/* ── CHAT PANEL ── */
.chat-header {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.chat-avatar {
  width: 36px;
  height: 36px;
  background: var(--accent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.chat-title {
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  font-size: 14px;
}

.chat-sub {
  font-size: 11px;
  color: var(--text-muted);
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  scroll-behavior: smooth;
}

.msg {
  display: flex;
  gap: 10px;
  max-width: 85%;
  animation: fadeUp 0.2s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  margin-top: 2px;
}

.msg.assistant .msg-avatar { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--border); }
.msg.user .msg-avatar { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

.msg-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 13px;
  line-height: 1.6;
}

.msg.user .msg-bubble {
  background: var(--surface2);
  border-color: var(--border2);
}

.msg-bubble strong { color: var(--accent); font-weight: 600; }

.msg-time {
  font-size: 10px;
  color: var(--text-hint);
  margin-top: 4px;
  font-family: 'DM Mono', monospace;
  padding: 0 4px;
}

.msg.user .msg-time { text-align: right; }

.typing-indicator {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: fit-content;
}

.typing-dot {
  width: 6px;
  height: 6px;
  background: var(--text-hint);
  border-radius: 50%;
  animation: typingBounce 1.2s infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-4px); opacity: 1; }
}

.chat-input-area {
  padding: 1rem 1.5rem 1.25rem;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.examples {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.example-chip {
  font-size: 11px;
  padding: 4px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}

.example-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.chat-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 10px 14px;
  color: var(--text);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  resize: none;
  min-height: 42px;
  max-height: 120px;
  line-height: 1.5;
  transition: border-color 0.15s;
}

.chat-input:focus { border-color: var(--accent); }
.chat-input::placeholder { color: var(--text-hint); }

.send-btn {
  width: 42px;
  height: 42px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}

.send-btn:hover { background: var(--accent-dim); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.send-btn svg { width: 18px; height: 18px; fill: var(--bg); }

/* ── DASHBOARD PANEL ── */
.panel-header {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.panel-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.3px;
}

.panel-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

.panel-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 1.25rem 1.5rem 2rem;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
  min-height: 0;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.1rem;
  transition: border-color 0.15s;
}

.kpi-card:hover { border-color: var(--border2); }
.kpi-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; margin-bottom: 6px; }
.kpi-val { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; letter-spacing: -0.5px; }
.kpi-val.pos { color: var(--accent); }
.kpi-val.neg { color: var(--red); }
.kpi-val.neutral { color: var(--text); }
.kpi-sub { font-size: 11px; color: var(--text-hint); margin-top: 4px; }

.section-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: visible;
  flex-shrink: 0;
}

.section-card-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.section-card-title {
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: -0.2px;
}

.section-card-body {
  padding: 12px 16px;
}

.table-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 12px;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.table-row:last-child { border-bottom: none; }
.table-row.header { font-size: 11px; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.5px; padding-top: 0; }

.table-desc { color: var(--text); }
.table-cat {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 20px;
  background: var(--surface2);
  color: var(--text-muted);
  border: 1px solid var(--border);
  white-space: nowrap;
}

.table-val { font-family: 'DM Mono', monospace; font-size: 13px; text-align: right; white-space: nowrap; }
.table-val.pos { color: var(--accent); }
.table-val.neg { color: var(--red); }

.progress-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}

.progress-row:last-child { border-bottom: none; }

.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
}

.progress-label { color: var(--text); }
.progress-vals { display: flex; gap: 8px; align-items: center; }
.progress-exec { font-family: 'DM Mono', monospace; font-size: 12px; }
.progress-plan { font-size: 11px; color: var(--text-hint); }

.progress-bar-track {
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s ease;
}

.bar-ok { background: var(--accent); }
.bar-warn { background: var(--yellow); }
.bar-over { background: var(--red); }

.empty-state {
  text-align: center;
  padding: 2rem;
  color: var(--text-hint);
  font-size: 13px;
  line-height: 1.8;
}

.empty-state strong { display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 4px; }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 500;
}

.badge-green { background: var(--accent-bg); color: var(--accent); border: 1px solid rgba(200,240,96,0.2); }
.badge-red { background: var(--red-bg); color: var(--red); border: 1px solid rgba(255,90,90,0.2); }
.badge-yellow { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(240,200,96,0.2); }

/* ── ORÇAMENTO PANEL ── */
.budget-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}

.budget-section { display: flex; flex-direction: column; gap: 0; }

.budget-item {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 9px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-top: none;
  font-size: 13px;
  transition: background 0.1s;
}

.budget-item:first-of-type { border-top: 1px solid var(--border); border-radius: var(--radius-sm) var(--radius-sm) 0 0; }
.budget-item:last-of-type { border-radius: 0 0 var(--radius-sm) var(--radius-sm); }
.budget-item:hover { background: var(--surface); }

.budget-item-label { color: var(--text-muted); }
.budget-item-val { font-family: 'DM Mono', monospace; font-size: 13px; text-align: right; }

.budget-total {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  margin-top: 6px;
  font-size: 13px;
  font-weight: 600;
}

.budget-total.receita { background: var(--accent-bg); color: var(--accent); }
.budget-total.gasto { background: var(--red-bg); color: var(--red); }
.budget-total.sobra { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.budget-total-val { font-family: 'DM Mono', monospace; }

/* ── PATRIMÔNIO PANEL ── */
.asset-list { display: flex; flex-direction: column; gap: 0; width: 100%; }

.asset-item {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 16px;
  align-items: center;
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-top: none;
  font-size: 13px;
}
.asset-item:first-child { border-top: 1px solid var(--border); border-radius: var(--radius-sm) var(--radius-sm) 0 0; }
.asset-item:last-child { border-radius: 0 0 var(--radius-sm) var(--radius-sm); }

.asset-name { color: var(--text); font-weight: 500; }
.asset-type { font-size: 11px; color: var(--text-hint); margin-top: 1px; }
.asset-pct { font-size: 11px; color: var(--text-hint); font-family: 'DM Mono', monospace; }
.asset-val { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent); text-align: right; }

.reset-btn {
  width: 100%;
  padding: 6px;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-hint);
  font-size: 11px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 0;
}
.reset-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }

.mes-badge {
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 20px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  text-transform: capitalize;
}

.fechar-mes-btn {
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text-muted);
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.fechar-mes-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

.hist-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  cursor: pointer;
  transition: all 0.15s;
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  gap: 16px;
  align-items: center;
  flex-shrink: 0;
}
.hist-card:hover { border-color: var(--border2); background: var(--surface2); }
.hist-mes { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; text-transform: capitalize; }
.hist-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.hist-val { font-family: 'DM Mono', monospace; font-size: 14px; text-align: right; }
.hist-arrow { color: var(--text-hint); font-size: 16px; }

/* ── EXPORT BLOCK ── */
.export-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.1rem 1.25rem;
}

.export-title {
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  font-size: 13px;
  margin-bottom: 4px;
}

.export-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 12px;
  line-height: 1.5;
}

.export-btns {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.exp-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--accent);
  background: var(--accent-bg);
  color: var(--accent);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.exp-btn:hover { background: var(--accent); color: var(--bg); }

.exp-btn-alt {
  background: var(--surface2);
  border-color: var(--border2);
  color: var(--text-muted);
}

.exp-btn-alt:hover { background: var(--surface); color: var(--text); border-color: var(--border2); }

.copy-toast {
  margin-top: 10px;
  font-size: 12px;
  color: var(--accent);
  background: var(--accent-bg);
  border: 1px solid rgba(200,240,96,0.2);
  border-radius: var(--radius-sm);
  padding: 7px 12px;
  animation: fadeUp 0.2s ease;
}

/* ── INLINE EDITING ── */
.add-inline-btn {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: none;
  color: var(--text-muted);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.add-inline-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

.budget-item-editable {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 8px;
  align-items: center;
  padding: 7px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-top: none;
  font-size: 13px;
  transition: background 0.1s;
}
.budget-item-editable:first-of-type { border-top: 1px solid var(--border); border-radius: var(--radius-sm) var(--radius-sm) 0 0; }
.budget-item-editable:last-of-type { border-radius: 0 0 var(--radius-sm) var(--radius-sm); }
.budget-item-editable:hover { background: var(--surface); }

.editable-label {
  color: var(--text-muted);
  cursor: text;
  outline: none;
  border-radius: 3px;
  padding: 1px 3px;
}
.editable-label:focus { background: var(--surface); color: var(--text); border: 1px solid var(--border2); }

.editable-val {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  text-align: right;
  cursor: text;
  outline: none;
  border-radius: 3px;
  padding: 1px 4px;
  min-width: 70px;
  border: 1px solid transparent;
  background: transparent;
  color: inherit;
}
.editable-val:focus { background: var(--surface); border-color: var(--border2); }

.del-item-btn {
  background: none;
  border: none;
  color: var(--text-hint);
  cursor: pointer;
  font-size: 13px;
  padding: 2px 4px;
  border-radius: 3px;
  transition: all 0.15s;
  opacity: 0;
  font-family: monospace;
}
.budget-item-editable:hover .del-item-btn { opacity: 1; }
.del-item-btn:hover { color: var(--red); background: var(--red-bg); }

.inline-field {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 7px 10px;
  color: var(--text);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  width: 100%;
}
.inline-field:focus { border-color: var(--accent); }

.save-inline-btn {
  padding: 7px 16px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--accent);
  color: var(--bg);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.save-inline-btn:hover { background: var(--accent-dim); }

.cancel-inline-btn {
  padding: 7px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: none;
  color: var(--text-muted);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}
.cancel-inline-btn:hover { background: var(--surface2); }

.asset-item-edit {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  gap: 12px;
  align-items: center;
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-top: none;
  font-size: 13px;
  transition: background 0.1s;
  flex-shrink: 0;
}
.asset-item-edit:first-child { border-top: 1px solid var(--border); border-radius: var(--radius-sm) var(--radius-sm) 0 0; }
.asset-item-edit:last-child { border-radius: 0 0 var(--radius-sm) var(--radius-sm); }
.asset-item-edit:hover { background: var(--surface); }
.asset-item-edit:hover .del-item-btn { opacity: 1; }

.reg-type-toggle {
  display: flex;
  gap: 8px;
}

.reg-type-btn {
  flex: 1;
  padding: 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text-muted);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.reg-type-btn.active.gasto-active {
  background: var(--red-bg);
  border-color: var(--red);
  color: var(--red);
}

.reg-type-btn.active.receita-active {
  background: var(--accent-bg);
  border-color: var(--accent);
  color: var(--accent);
}

.reg-type-btn.active {
  background: var(--red-bg);
  border-color: var(--red);
  color: var(--red);
}

/* ── ASSET LIST SCROLLABLE ── *//* ── ASSET LIST SCROLLABLE ── */
.asset-list-wrap {
  width: 100%;
}

/* Fix section-card-header flex for all cases */
.section-card-header {
  display: flex !important;
  justify-content: space-between !important;
  align-items: center !important;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── RESPONSIVE / MOBILE ── */
@media (max-width: 700px) {
  .shell { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; height: 100vh; height: 100dvh; }
  .sidebar { display: none; }
  .main { padding-bottom: 64px; }
  .cards-grid { grid-template-columns: 1fr 1fr; }
  .budget-grid { grid-template-columns: 1fr; }
  .panel-header { padding: 1rem; flex-wrap: wrap; gap: 8px; }
  .panel-body { padding: 1rem 1rem 1.5rem; }
  .field-row { grid-template-columns: 1fr; }
  .mes-badge { display: none; }
  .fechar-mes-btn { font-size: 11px; padding: 5px 10px; }
  .bottom-nav { display: flex !important; }
  .mobile-header { display: flex !important; }
}
.bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  z-index: 100; height: 60px;
}
.bottom-nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  padding: 6px 4px; background: none; border: none;
  color: var(--text-hint); font-size: 10px;
  font-family: 'DM Sans', sans-serif; cursor: pointer;
  transition: all 0.15s; -webkit-tap-highlight-color: transparent;
}
.bottom-nav-item.active { color: var(--accent); }
.bottom-nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
.mobile-header {
  display: none; padding: 10px 16px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  align-items: center; justify-content: space-between; flex-shrink: 0;
}
.mobile-logo { display: flex; align-items: center; gap: 8px; }
.mobile-logo-mark {
  width: 28px; height: 28px; background: var(--accent);
  border-radius: 6px; display: flex; align-items: center;
  justify-content: center; font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 12px; color: var(--bg);
}
.mobile-logo-text { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; color: var(--text); }
.mobile-meta { display: flex; align-items: center; gap: 8px; }
.mobile-moeda { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.mobile-moeda-btn { padding: 4px 8px; background: none; border: none; color: var(--text-hint); font-size: 11px; font-family: 'DM Sans', sans-serif; cursor: pointer; font-weight: 500; }
.mobile-moeda-btn.active { background: var(--accent); color: var(--bg); font-weight: 700; }
.mobile-reset-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text-hint); font-size: 11px; font-family: 'DM Sans', sans-serif; padding: 4px 8px; cursor: pointer; }
.mobile-reset-btn:active { border-color: var(--red); color: var(--red); background: var(--red-bg); }
</style>
</head>
<body>
<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-mark">MF</div>
        <div>
          <div class="logo-text">Meu Financeiro</div>
          <div class="logo-sub">Mentoria · Brasileiros na Europa</div>
        </div>
      </div>
      <div class="config-block">
        <div class="config-row">
          <span class="config-label">Nome</span>
          <input class="config-input" id="cfg-nome" placeholder="Seu nome" oninput="updateNome()">
        </div>
        <div class="config-row">
          <span class="config-label">Moeda</span>
          <div class="currency-toggle">
            <button class="currency-btn active" onclick="setCurrency('BRL',this)">R$</button>
            <button class="currency-btn" onclick="setCurrency('EUR',this)">€</button>
          </div>
        </div>
      </div>
    </div>

    <nav class="nav">
      <span class="nav-section">Principal</span>
      <button class="nav-item active" onclick="showPanel('chat',this)">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Registrar
      </button>
      <button class="nav-item" onclick="showPanel('dashboard',this)">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Resumo do mês
      </button>
      <span class="nav-section">Planejamento</span>
      <button class="nav-item" onclick="showPanel('orcamento',this)">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Orçamento
      </button>
      <button class="nav-item" onclick="showPanel('patrimonio',this)">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        Patrimônio
      </button>
      <button class="nav-item" onclick="showPanel('cartao',this)">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        Cartão de Crédito
      </button>
      <span class="nav-section">Histórico</span>
      <button class="nav-item" onclick="showPanel('historico',this)">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Meses anteriores
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="orçamento-mini">
        <div class="mini-row">
          <span class="mini-label">Receita planejada</span>
          <span class="mini-val" id="mini-rec">—</span>
        </div>
        <div class="mini-row">
          <span class="mini-label">Gasto este mês</span>
          <span class="mini-val neg" id="mini-gasto">—</span>
        </div>
        <div class="mini-row">
          <span class="mini-label">Sobra estimada</span>
          <span class="mini-val pos" id="mini-sobra">—</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- CHAT PANEL -->
    <div class="panel active" id="panel-chat">
      <div class="panel-header">
        <div class="panel-title">Registrar lançamento</div>
        <div class="panel-sub">Adicione um gasto ou receita rapidamente</div>
      </div>
      <div class="panel-body">

        <div class="section-card">
          <div class="section-card-body" style="padding:1.25rem 1.5rem">

            <div class="reg-type-toggle">
              <button class="reg-type-btn active" id="btn-gasto" onclick="setTipo('gasto')">💸 Gasto</button>
              <button class="reg-type-btn" id="btn-receita" onclick="setTipo('receita')">💰 Receita</button>
            </div>

            <div class="field-group" style="margin-top:1rem">
              <label class="field-label">Descrição</label>
              <input class="inline-field" id="reg-desc" placeholder="Ex: Mercado, Aluguel, Salário..." style="font-size:14px;padding:10px 12px" onkeydown="if(event.key==='Enter'){document.getElementById('reg-valor').focus()}">
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
              <div class="field-group">
                <label class="field-label">Valor</label>
                <input class="inline-field" id="reg-valor" type="number" placeholder="0,00" min="0" step="0.01" style="font-size:14px;padding:10px 12px" onkeydown="if(event.key==='Enter'){registrarLancamento()}">
              </div>
              <div class="field-group">
                <label class="field-label" style="display:flex;justify-content:space-between;align-items:center">Categoria <button onclick="abrirGerenciarCats()" style="background:none;border:none;color:var(--text-hint);font-size:11px;cursor:pointer;font-family:DM Sans,sans-serif" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-hint)'">+ Gerenciar</button></label>
                <select class="inline-field" id="reg-cat" style="font-size:14px;padding:10px 12px"></select>
              </div>
            </div>

            <div class="field-group" style="margin-top:4px">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text-muted)">
                <input type="checkbox" id="reg-cartao" style="width:16px;height:16px;accent-color:var(--accent)">
                Lançar no cartão de crédito
              </label>
            </div>

            <button class="save-inline-btn" id="reg-btn" onclick="registrarLancamento()" style="width:100%;padding:12px;font-size:14px;margin-top:0.5rem">
              ✓ Registrar
            </button>
          </div>
        </div>

        <div class="section-card">
          <div class="section-card-header">
            <span class="section-card-title">Lançamentos do mês</span>
            <span id="lanc-count" style="font-size:12px;color:var(--text-muted)">0 lançamentos</span>
          </div>
          <div class="section-card-body" style="padding:0">
            <div class="asset-list-wrap">
              <div id="ultimos-lancs"></div>
            </div>
          </div>
        </div>

        <!-- MODAL EDITAR -->
        <div id="edit-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center">
          <div style="background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:1.5rem;width:90%;max-width:400px">
            <div style="font-family:Syne,sans-serif;font-weight:700;font-size:15px;margin-bottom:1rem">Editar lançamento</div>
            <div class="field-group">
              <label class="field-label">Descrição</label>
              <input class="inline-field" id="edit-desc" style="font-size:14px;padding:10px 12px">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
              <div class="field-group">
                <label class="field-label">Valor</label>
                <input class="inline-field" id="edit-valor" type="number" min="0" step="0.01" style="font-size:14px;padding:10px 12px">
              </div>
              <div class="field-group">
                <label class="field-label">Tipo</label>
                <select class="inline-field" id="edit-tipo" style="font-size:14px;padding:10px 12px" onchange="atualizarCatsEdit()">
                  <option value="gasto">💸 Gasto</option>
                  <option value="receita">💰 Receita</option>
                </select>
              </div>
            </div>
            <div class="field-group">
              <label class="field-label">Categoria</label>
              <select class="inline-field" id="edit-cat" style="font-size:14px;padding:10px 12px">
                <option value="Alimentação">🍽 Alimentação</option>
                <option value="Moradia">🏠 Moradia</option>
                <option value="Transporte">🚌 Transporte</option>
                <option value="Lazer">🎉 Lazer</option>
                <option value="Saúde">💊 Saúde</option>
                <option value="Esporte">🏃 Esporte</option>
                <option value="Outros">📦 Outros</option>
              </select>
            </div>
            <div class="field-group">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text-muted)">
                <input type="checkbox" id="edit-cartao" style="width:16px;height:16px;accent-color:var(--accent)">
                No cartão de crédito
              </label>
            </div>
            <div style="display:flex;gap:8px;margin-top:1rem">
              <button class="save-inline-btn" onclick="salvarEdicao()" style="flex:1;padding:10px">Salvar</button>
              <button class="cancel-inline-btn" onclick="fecharModal()" style="padding:10px 16px">Cancelar</button>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- MODAL CATEGORIAS -->
    <div id="cats-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center">
      <div style="background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:1.5rem;width:90%;max-width:420px;max-height:80vh;overflow-y:auto">
        <div style="font-family:Syne,sans-serif;font-weight:700;font-size:15px;margin-bottom:1rem">Gerenciar categorias</div>
        <div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Gastos</div>
        <div id="cats-gasto-list" style="margin-bottom:10px"></div>
        <div style="display:flex;gap:8px;margin-bottom:1.25rem">
          <input class="inline-field" id="nova-cat-gasto" placeholder="Nova categoria de gasto" style="font-size:13px" onkeydown="if(event.key==='Enter')adicionarCat('gasto')">
          <button class="save-inline-btn" onclick="adicionarCat('gasto')" style="padding:8px 14px;white-space:nowrap">+</button>
        </div>
        <div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Receitas</div>
        <div id="cats-receita-list" style="margin-bottom:10px"></div>
        <div style="display:flex;gap:8px;margin-bottom:1.25rem">
          <input class="inline-field" id="nova-cat-receita" placeholder="Nova categoria de receita" style="font-size:13px" onkeydown="if(event.key==='Enter')adicionarCat('receita')">
          <button class="save-inline-btn" onclick="adicionarCat('receita')" style="padding:8px 14px;white-space:nowrap">+</button>
        </div>
        <button class="cancel-inline-btn" onclick="fecharCatsModal()" style="width:100%;padding:10px">Fechar</button>
      </div>
    </div>

    <!-- DASHBOARD PANEL -->
    <div class="panel" id="panel-dashboard">
      <div class="panel-header" style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div class="panel-title">Resumo do mês</div>
          <div class="panel-sub" id="dash-sub">Visão consolidada dos seus lançamentos</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="mes-badge" id="mes-badge"></span>
          <button class="fechar-mes-btn" onclick="fecharMes()">Fechar mês →</button>
        </div>
      </div>
      <div class="panel-body">
        <div class="cards-grid">
          <div class="kpi-card">
            <div class="kpi-label">Total Receitas</div>
            <div class="kpi-val pos" id="kpi-rec">R$ 0</div>
            <div class="kpi-sub" id="kpi-rec-sub">0 lançamentos</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Total Gastos</div>
            <div class="kpi-val neg" id="kpi-gasto">R$ 0</div>
            <div class="kpi-sub" id="kpi-gasto-sub">0 lançamentos</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Saldo do Mês</div>
            <div class="kpi-val neutral" id="kpi-saldo">R$ 0</div>
            <div class="kpi-sub" id="kpi-taxa">Taxa de poupança: 0%</div>
          </div>
        </div>

        <div class="section-card">
          <div class="section-card-header">
            <span class="section-card-title">Planejado vs Executado</span>
            <span class="badge badge-yellow" id="badge-status">Sem dados</span>
          </div>
          <div class="section-card-body" id="comp-body">
            <div class="empty-state">
              <strong>Nenhum lançamento ainda</strong>
              Vá para <em>Registrar</em> e comece a digitar seus gastos.
            </div>
          </div>
        </div>

        <div class="section-card">
          <div class="section-card-header">
            <span class="section-card-title">Últimos lançamentos</span>
          </div>
          <div class="section-card-body" id="lancamentos-body">
            <div class="empty-state">
              <strong>Nenhum lançamento ainda</strong>
            </div>
          </div>
        </div>

        <!-- EXPORTAR -->
        <div class="export-block">
          <div class="export-title">Enviar resumo para o mentor</div>
          <div class="export-sub">Gere um resumo do seu mês e copie para enviar no WhatsApp antes da sessão.</div>
          <div class="export-btns">
            <button class="exp-btn" onclick="exportarTexto()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
              Copiar resumo
            </button>
            <button class="exp-btn exp-btn-alt" onclick="exportarTxt()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Baixar .txt
            </button>
          </div>
          <div id="copy-toast" class="copy-toast" style="display:none">✓ Copiado! Cole no WhatsApp para o seu mentor.</div>
        </div>
      </div>
    </div>

    <!-- ORÇAMENTO PANEL -->
    <div class="panel" id="panel-orcamento">
      <div class="panel-header">
        <div class="panel-title">Orçamento mensal</div>
        <div class="panel-sub">Clique em qualquer valor para editar — tudo atualiza automaticamente</div>
      </div>
      <div class="panel-body">
        <div class="budget-grid">
          <div>
