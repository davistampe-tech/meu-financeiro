<script>
// ── STATE ──
let state = {
  nome: '',
  moeda: 'BRL',
  lancamentos: [],
  mesAtual: '',
  historico: [],
  orcamento: {
    receitas: [],
    gastos: []
  },
  cartoes: [],
  categoriasGasto: ['Alimentação','Moradia','Transporte','Lazer','Saúde','Esporte','Outros'],
  categoriasReceita: ['Salário','Freelance','Mesada','Outros'],
  patrimonio: {
    ativos: [
      { nome: 'Exemplo — Poupança', inst: 'Banco', tipo: 'Poupança', val: 5000 },
    ],
    dividas: []
  },
  chatHistory: []
};

// Set default mesAtual
state.mesAtual = new Date().toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

// Version control — bump to force clear old localStorage
const APP_VERSION = 'v14';
if (localStorage.getItem('mf_version') !== APP_VERSION) {
  localStorage.removeItem('mf_state');
  localStorage.setItem('mf_version', APP_VERSION);
}

// Load from localStorage
try {
  const saved = localStorage.getItem('mf_state');
  if (saved) {
    const parsed = JSON.parse(saved);
    state = { ...state, ...parsed };
    if (!state.mesAtual) state.mesAtual = new Date().toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
    if (!state.historico) state.historico = [];
  }
} catch(e) { localStorage.removeItem('mf_state'); }

function resetarDados() {
  if (!confirm('Tem certeza? Isso apaga todos os lançamentos, orçamento, investimentos e configurações.')) return;
  localStorage.removeItem('mf_state');
  state.lancamentos = [];
  state.orcamento = { receitas: [], gastos: [] };
  state.patrimonio = { ativos: [], dividas: [] };
  state.cartoes = [];
  state.chatHistory = [];
  state.historico = [];
  state.categoriasGasto = ['Alimentação','Moradia','Transporte','Lazer','Saúde','Esporte','Outros'];
  state.categoriasReceita = ['Salário','Freelance','Mesada','Outros'];
  state.mesAtual = new Date().toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
  state.nome = '';
  state.moeda = 'BRL';
  document.getElementById('cfg-nome').value = '';
  updateMiniBar();
  updateMesBadge();
updateMobileHeader();
renderAll();
renderUltimosLancs();
populateRegCat();
  // Clear chat messages except first
  const msgs = document.getElementById('chat-messages');
  while (msgs.children.length > 1) msgs.removeChild(msgs.lastChild);
}

function saveState() {
  try { localStorage.setItem('mf_state', JSON.stringify(state)); } catch(e) {}
}

// ── CURRENCY ──
let sym = 'R$';
function setCurrency(c, btn) {
  state.moeda = c;
  sym = c === 'EUR' ? '€' : 'R$';
  document.querySelectorAll('.currency-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  saveState();
  renderAll();
}

function fmt(val) {
  return sym + ' ' + Math.abs(val).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ── NAV ──
function showPanel(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'dashboard') renderDashboard();
  if (id === 'orcamento') renderOrcamento();
  if (id === 'patrimonio') renderPatrimonio();
  if (id === 'cartao') renderCartao();
  if (id === 'historico') renderHistorico();
}

function updateNome() {
  state.nome = document.getElementById('cfg-nome').value;
  const sub = document.getElementById('chat-sub');
  if (state.nome) sub.textContent = 'Olá, ' + state.nome + ' — escreva seus gastos em linguagem natural';
  saveState();
}

// ── CHAT ──
function fillInput(text) {
  const inp = document.getElementById('chat-input');
  inp.value = text;
  inp.focus();
  autoResize(inp);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function now() {
  return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

function addMsg(role, text) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avatar = role === 'assistant' ? '✦' : (state.nome ? state.nome[0].toUpperCase() : 'V');
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div>
      <div class="msg-bubble">${text}</div>
      <div class="msg-time">${now()}</div>
    </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing-msg';
  div.innerHTML = `<div class="msg-avatar">✦</div><div><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-msg');
  if (el) el.remove();
}

let tipoAtual = 'gasto';

function setTipo(tipo) {
  tipoAtual = tipo;
  const btnGasto = document.getElementById('btn-gasto');
  const btnReceita = document.getElementById('btn-receita');
  btnGasto.classList.remove('active');
  btnReceita.classList.remove('active');
  if (tipo === 'gasto') {
    btnGasto.classList.add('active');
    btnGasto.style.background = 'var(--red-bg)';
    btnGasto.style.borderColor = 'var(--red)';
    btnGasto.style.color = 'var(--red)';
    btnReceita.style.background = '';
    btnReceita.style.borderColor = '';
    btnReceita.style.color = '';
    // Update category options
    const cat = document.getElementById('reg-cat');
    cat.innerHTML = '<option value="Alimentação">🍽 Alimentação</option><option value="Moradia">🏠 Moradia</option><option value="Transporte">🚌 Transporte</option><option value="Lazer">🎉 Lazer</option><option value="Saúde">💊 Saúde</option><option value="Esporte">🏃 Esporte</option><option value="Outros">📦 Outros</option>';
    document.getElementById('reg-cartao').parentElement.style.display = 'flex';
  } else {
    btnReceita.classList.add('active');
    btnReceita.style.background = 'var(--accent-bg)';
    btnReceita.style.borderColor = 'var(--accent)';
    btnReceita.style.color = 'var(--accent)';
    btnGasto.style.background = '';
    btnGasto.style.borderColor = '';
    btnGasto.style.color = '';
    const cat = document.getElementById('reg-cat');
    cat.innerHTML = '<option value="Salário">💼 Salário</option><option value="Freelance">💻 Freelance</option><option value="Mesada">🏦 Mesada</option><option value="Outros">📦 Outros</option>';
    document.getElementById('reg-cartao').parentElement.style.display = 'none';
  }
  populateRegCat();
}

function registrarLancamento() {
  const desc = document.getElementById('reg-desc').value.trim();
  const valor = parseFloat(document.getElementById('reg-valor').value) || 0;
  const cat = document.getElementById('reg-cat').value;
  const cartao = document.getElementById('reg-cartao').checked;

  if (!desc) { document.getElementById('reg-desc').focus(); return; }
  if (valor <= 0) { document.getElementById('reg-valor').focus(); return; }

  const lancamento = {
    descricao: desc,
    categoria: tipoAtual === 'receita' ? cat : cat,
    tipo: tipoAtual,
    valor,
    cartao: tipoAtual === 'gasto' ? cartao : false,
    data: new Date().toLocaleDateString('pt-BR'),
    id: Date.now()
  };

  state.lancamentos.push(lancamento);
  saveState();
  updateMiniBar();
  renderDashboard();
  renderCartao();
  renderUltimosLancs();

  // Clear form
  document.getElementById('reg-desc').value = '';
  document.getElementById('reg-valor').value = '';
  document.getElementById('reg-cartao').checked = false;
  document.getElementById('reg-desc').focus();

  // Visual feedback
  const btn = document.querySelector('.save-inline-btn');
  const original = btn.innerHTML;
  btn.innerHTML = '✓ Registrado!';
  btn.style.background = 'var(--success, #2D7A4F)';
  setTimeout(() => { btn.innerHTML = original; btn.style.background = ''; }, 1500);
}

function limparUltimo() {
  if (state.lancamentos.length === 0) return;
  if (!confirm('Desfazer o último lançamento?')) return;
  state.lancamentos.pop();
  saveState();
  updateMiniBar();
  renderDashboard();
  renderCartao();
  renderUltimosLancs();
}

function renderUltimosLancs() {
  const el = document.getElementById('ultimos-lancs');
  if (!el) return;
  const count = document.getElementById('lanc-count');
  if (count) count.textContent = state.lancamentos.length + ' lançamento' + (state.lancamentos.length !== 1 ? 's' : '');
  const recent = [...state.lancamentos].reverse().slice(0, 30);
  if (recent.length === 0) {
    el.innerHTML = '<div class="empty-state" style="padding:1.5rem"><strong>Nenhum lançamento ainda</strong>Use o formulário acima para registrar.</div>';
    return;
  }
  el.innerHTML = recent.map(l => {
    const idx = state.lancamentos.findIndex(x => x.id === l.id);
    return `<div style="display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);font-size:13px">
      <span style="color:var(--text)">${l.descricao}</span>
      <span style="font-size:11px;padding:2px 8px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);white-space:nowrap">${l.categoria}${l.cartao ? ' 💳' : ''}</span>
      <span style="font-family:DM Mono,monospace;font-size:13px;color:${l.tipo === 'receita' ? 'var(--accent)' : 'var(--red)'};white-space:nowrap">${l.tipo === 'receita' ? '+' : '-'}${fmt(l.valor)}</span>
      <div style="display:flex;gap:4px">
        <button onclick="abrirEdicao(${idx})" title="Editar" style="background:none;border:none;color:var(--text-hint);cursor:pointer;padding:3px 5px;border-radius:4px;font-size:13px" onmouseover="this.style.color='var(--accent)';this.style.background='var(--accent-bg)'" onmouseout="this.style.color='var(--text-hint)';this.style.background='none'">✎</button>
        <button onclick="deletarLancamento(${idx})" title="Excluir" style="background:none;border:none;color:var(--text-hint);cursor:pointer;padding:3px 5px;border-radius:4px;font-size:13px" onmouseover="this.style.color='var(--red)';this.style.background='var(--red-bg)'" onmouseout="this.style.color='var(--text-hint)';this.style.background='none'">✕</button>
      </div>
    </div>`}).join('');
}

let editandoIdx = -1;

function abrirEdicao(idx) {
  const l = state.lancamentos[idx];
  editandoIdx = idx;
  document.getElementById('edit-desc').value = l.descricao;
  document.getElementById('edit-valor').value = l.valor;
  document.getElementById('edit-tipo').value = l.tipo;
  document.getElementById('edit-cartao').checked = l.cartao || false;
  atualizarCatsEdit(l.categoria);
  document.getElementById('edit-modal').style.display = 'flex';
}

function atualizarCatsEdit(selectedCat) {
  const tipo = document.getElementById('edit-tipo').value;
  const cat = document.getElementById('edit-cat');
  const cats = tipo === 'receita' ? state.categoriasReceita : state.categoriasGasto;
  cat.innerHTML = cats.map(c => `<option value="${c}">${getCatEmoji(c)} ${c}</option>`).join('');
  if (selectedCat) {
    const opt = [...cat.options].find(o => o.value === selectedCat);
    if (opt) cat.value = selectedCat;
  }
}

function salvarEdicao() {
  if (editandoIdx < 0) return;
  const desc = document.getElementById('edit-desc').value.trim();
  const valor = parseFloat(document.getElementById('edit-valor').value) || 0;
  const tipo = document.getElementById('edit-tipo').value;
  const cat = document.getElementById('edit-cat').value;
  const cartao = document.getElementById('edit-cartao').checked;
  if (!desc || valor <= 0) return;
  state.lancamentos[editandoIdx] = { ...state.lancamentos[editandoIdx], descricao: desc, valor, tipo, categoria: cat, cartao };
  saveState();
  updateMiniBar();
  renderDashboard();
  renderCartao();
  renderUltimosLancs();
  fecharModal();
}

function fecharModal() {
  document.getElementById('edit-modal').style.display = 'none';
  editandoIdx = -1;
}

function deletarLancamento(idx) {
  if (!confirm('Remover este lançamento?')) return;
  state.lancamentos.splice(idx, 1);
  saveState();
  updateMiniBar();
  renderDashboard();
  renderCartao();
  renderUltimosLancs();
}

// ── RENDERS ──
function updateMiniBar() {
  const totalGasto = state.lancamentos.filter(l => l.tipo === 'gasto').reduce((s, l) => s + l.valor, 0);
  const totalRec = state.orcamento.receitas.reduce((s, r) => s + r.val, 0);
  const sobra = totalRec - totalGasto;
  document.getElementById('mini-rec').textContent = fmt(totalRec);
  document.getElementById('mini-gasto').textContent = fmt(totalGasto);
  document.getElementById('mini-sobra').textContent = fmt(sobra);
}

function renderDashboard() {
  const lancamentos = state.lancamentos;
  const receitas = lancamentos.filter(l => l.tipo === 'receita');
  const gastos = lancamentos.filter(l => l.tipo === 'gasto');
  const totalRec = receitas.reduce((s, l) => s + l.valor, 0);
  const totalGasto = gastos.reduce((s, l) => s + l.valor, 0);
  const saldo = totalRec - totalGasto;
  const planejadoRec = state.orcamento.receitas.reduce((s, r) => s + r.val, 0);
  const taxa = planejadoRec > 0 ? Math.round((saldo / planejadoRec) * 100) : 0;

  document.getElementById('kpi-rec').textContent = fmt(totalRec);
  document.getElementById('kpi-rec-sub').textContent = receitas.length + ' lançamento' + (receitas.length !== 1 ? 's' : '');
  document.getElementById('kpi-gasto').textContent = fmt(totalGasto);
  document.getElementById('kpi-gasto-sub').textContent = gastos.length + ' lançamento' + (gastos.length !== 1 ? 's' : '');
  document.getElementById('kpi-saldo').textContent = fmt(saldo);
  document.getElementById('kpi-saldo').className = 'kpi-val ' + (saldo >= 0 ? 'pos' : 'neg');
  document.getElementById('kpi-taxa').textContent = 'Taxa de poupança: ' + taxa + '%';

  // Comparativo
  const cats = ['Lazer', 'Alimentação', 'Moradia', 'Transporte', 'Saúde', 'Esporte', 'Outros'];
  const compBody = document.getElementById('comp-body');
  if (lancamentos.length === 0) {
    compBody.innerHTML = '<div class="empty-state"><strong>Nenhum lançamento ainda</strong>Vá para Registrar e comece a digitar.</div>';
    document.getElementById('badge-status').textContent = 'Sem dados';
    document.getElementById('badge-status').className = 'badge badge-yellow';
  } else {
    let html = '';
    state.orcamento.gastos.forEach(og => {
      const executado = gastos.filter(l => l.categoria === og.label).reduce((s, l) => s + l.valor, 0);
      const pct = og.val > 0 ? Math.min((executado / og.val) * 100, 100) : 0;
      const over = executado > og.val;
      const barClass = over ? 'bar-over' : pct > 80 ? 'bar-warn' : 'bar-ok';
      html += `<div class="progress-row">
        <div class="progress-meta">
          <span class="progress-label">${og.label}</span>
          <div class="progress-vals">
            <span class="progress-exec ${over ? 'neg' : ''}" style="color:${over ? 'var(--red)' : 'var(--text)'}">${fmt(executado)}</span>
            <span class="progress-plan">/ ${fmt(og.val)}</span>
          </div>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill ${barClass}" style="width:${pct}%"></div>
        </div>
      </div>`;
    });
    compBody.innerHTML = html;

    const overBudget = state.orcamento.gastos.some(og => {
      const exec = gastos.filter(l => l.categoria === og.label).reduce((s, l) => s + l.valor, 0);
      return exec > og.val;
    });
    const badge = document.getElementById('badge-status');
    if (overBudget) { badge.textContent = '⚠ Excedeu categoria'; badge.className = 'badge badge-red'; }
    else { badge.textContent = '✓ Dentro do plano'; badge.className = 'badge badge-green'; }
  }

  // Últimos lançamentos
  const lBody = document.getElementById('lancamentos-body');
  if (lancamentos.length === 0) {
    lBody.innerHTML = '<div class="empty-state"><strong>Nenhum lançamento ainda</strong></div>';
  } else {
    const sorted = [...lancamentos].reverse().slice(0, 10);
    lBody.innerHTML = sorted.map(l => `
      <div class="table-row">
        <span class="table-desc">${l.descricao}</span>
        <span class="table-cat">${l.categoria}</span>
        <span class="table-val ${l.tipo === 'receita' ? 'pos' : 'neg'}">${l.tipo === 'receita' ? '+' : '-'}${fmt(l.valor)}</span>
      </div>`).join('');
  }
}

function renderOrcamento() {
  const recEl = document.getElementById('bud-receitas');
  recEl.innerHTML = state.orcamento.receitas.map((r, i) => `
    <div class="budget-item-editable">
      <span class="editable-label" contenteditable="true"
        onblur="updateOrcLabel('receitas',${i},this.textContent)">${r.label}</span>
      <input class="editable-val" type="number" value="${r.val}"
        style="color:var(--accent)" min="0" step="0.01"
        onchange="updateOrcVal('receitas',${i},this.value)">
      <button class="del-item-btn" onclick="delOrcItem('receitas',${i})">✕</button>
    </div>`).join('');

  const gastEl = document.getElementById('bud-gastos');
  gastEl.innerHTML = state.orcamento.gastos.map((g, i) => `
    <div class="budget-item-editable">
      <span class="editable-label" contenteditable="true"
        onblur="updateOrcLabel('gastos',${i},this.textContent)">${g.label}</span>
      <input class="editable-val" type="number" value="${g.val}"
        style="color:var(--red)" min="0" step="0.01"
