    aList.innerHTML = '<div class="empty-state"><strong>Nenhum ativo registrado</strong><br>Clique em "+ Adicionar" para cadastrar.</div>';
  } else {
    aList.innerHTML = ativos.map((a, i) => `
      <div class="asset-item-edit">
        <div>
          <div class="asset-name" contenteditable="true"
            onblur="updateAtivoField(${i},'nome',this.textContent)">${a.nome}</div>
